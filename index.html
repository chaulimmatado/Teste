<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARLYS_OS // MOBILE_ELITE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #00f2ff; --s: #ff0055; --a: #bcff00; --bg: #000;
            --glass: rgba(10, 10, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background: var(--bg); color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh; width: 100vw;
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- BACKGROUND DE ALTA PERFORMANCE --- */
        #bg-layer { position: fixed; top: 0; left: 0; z-index: -1; }

        /* --- HEADER ADAPTATIVO --- */
        .header {
            height: 60px; background: var(--glass);
            border-bottom: 2px solid var(--p);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 100;
        }

        .sys-info { font-family: 'Orbitron'; font-size: 12px; color: var(--p); letter-spacing: 2px; }

        /* --- CONTAINER PRINCIPAL (LIQUID GRID) --- */
        .container {
            flex: 1; display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 10px; padding: 10px;
        }

        /* AJUSTES MOBILE-FIRST CRÍTICOS */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto;
                padding: 5px;
            }
            .sidebar { display: none; } /* Oculta tralha no mobile */
            .mobile-nav { display: flex !important; }
        }

        .panel {
            background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 8px; position: relative; overflow: hidden;
            backdrop-filter: blur(20px);
        }

        /* --- VIEWPORT DO JOGO (FULLSCREEN MOBILE) --- */
        .viewport { grid-column: 2; border: 1px solid var(--s); position: relative; background: #000; }
        @media (max-width: 1024px) { .viewport { grid-column: 1; height: 100%; } }

        canvas { width: 100%; height: 100%; touch-action: none; }

        /* --- CONTROLES TOUCH DE ELITE --- */
        .touch-zone {
            display: none; position: absolute; bottom: 0; width: 100%;
            height: 40%; background: linear-gradient(transparent, rgba(255, 0, 85, 0.1));
            justify-content: center; align-items: center; pointer-events: none;
        }
        .btn-jump {
            display: none; pointer-events: auto;
            width: 100px; height: 100px; border-radius: 50%;
            border: 4px solid var(--s); background: rgba(0,0,0,0.5);
            color: var(--s); font-size: 30px; 
            box-shadow: 0 0 20px var(--s);
        }
        @media (max-width: 1024px) { .touch-zone, .btn-jump { display: flex; } }

        /* --- HUD MOBILE --- */
        .hud {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px;
            font-family: 'Orbitron'; pointer-events: none;
        }

        /* --- BARRA DE LINKS MOBILE (RODAPÉ) --- */
        .mobile-nav {
            display: none; height: 70px; background: var(--glass);
            border-top: 2px solid var(--p); justify-content: space-around; align-items: center;
        }
        .nav-item { color: var(--p); font-size: 20px; text-decoration: none; text-align: center; }
        .nav-item span { display: block; font-size: 8px; margin-top: 4px; font-weight: bold; }

        /* --- BOTÃO DE INICIALIZAÇÃO --- */
        .boot-btn {
            background: var(--p); color: #000; padding: 20px 40px;
            font-family: 'Orbitron'; font-weight: 900; border: none;
            cursor: pointer; box-shadow: 0 0 30px var(--p);
        }
    </style>
</head>
<body onload="boot()">

    <canvas id="bg-layer"></canvas>

    <header class="header">
        <div class="sys-info">CHARLYS_OS // v8.0</div>
        <div id="clock" style="color: var(--a); font-weight: 900;">00:00:00</div>
    </header>

    <main class="container">
        
        <aside class="panel sidebar">
            <div style="padding: 20px; text-align: center;">
                <img src="20260207_132012[1].jpg" style="width: 150px; border: 2px solid var(--p); border-radius: 20px;">
                <h2 style="margin-top: 15px; font-family: 'Orbitron';">CHARLYS</h2>
                <p style="color: var(--s); font-size: 10px;">SUPREME_DRIVE_UNIT</p>
                <div style="margin-top: 40px;">
                    <p style="font-size: 10px; margin-bottom: 10px;">SYSTEM_STABILITY</p>
                    <div style="height: 4px; background: #111;"><div style="width: 99%; height: 100%; background: var(--a);"></div></div>
                </div>
            </div>
        </aside>

        <section class="panel viewport">
            <div class="hud">
                <div><small>DIST</small><div id="score" style="font-size: 24px; color: var(--p);">0000</div></div>
                <div style="text-align: right;"><small>FPS</small><div id="fps" style="font-size: 24px; color: var(--a);">120</div></div>
            </div>

            <canvas id="titan-game"></canvas>

            <div class="touch-zone">
                <button class="btn-jump" id="mobile-jump"><i class="fas fa-bolt"></i></button>
            </div>

            <div id="overlay" style="position: absolute; inset:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
                <h1 style="font-family:'Orbitron'; font-size:40px; color:var(--p); margin-bottom:10px;">QUANTUM DRIVE</h1>
                <p style="font-size:10px; margin-bottom:30px; opacity:0.6;">[ MULTIPLATFORM OPTIMIZED ]</p>
                <button class="boot-btn" onclick="startEngine()">ENGAGE_CORE</button>
            </div>
        </section>

        <aside class="panel sidebar">
            <div style="padding: 20px;">
                <h4 style="font-size: 12px; color: var(--p);">LOG_STREAM</h4>
                <div id="logs" style="font-size: 9px; color: var(--a); margin-top: 15px; height: 150px; overflow: hidden;"></div>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
                <button onclick="toggleSound()" class="boot-btn" style="width: 100%; padding: 10px; font-size: 10px;">TOGGLE_AUDIO</button>
                <audio id="radio" loop src="https://stream.nightride.fm/nightride.mp3"></audio>
            </div>
        </aside>

    </main>

    <nav class="mobile-nav">
        <a href="https://instagram.com/inimigo_do_amigo.ofc" class="nav-item"><i class="fab fa-instagram"></i><span>INSTA</span></a>
        <a href="#" class="nav-item" onclick="startEngine()"><i class="fas fa-gamepad" style="color:var(--s)"></i><span>PLAY</span></a>
        <a href="https://wa.me/5569992919920" class="nav-item"><i class="fab fa-whatsapp"></i><span>WHATS</span></a>
    </nav>

    <script>
        const log = (m) => {
            const l = document.getElementById('logs');
            if(l) { l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; }
        };

        // --- BACKGROUND PERFORMANCE ---
        const bg = document.getElementById('bg-layer');
        const bctx = bg.getContext('2d');
        function initBg() {
            bg.width = window.innerWidth; bg.height = window.innerHeight;
            bctx.fillStyle = '#050508'; bctx.fillRect(0,0,bg.width, bg.height);
        }

        // --- TITAN ENGINE v8 (MOBILE OPTIMIZED) ---
        const canvas = document.getElementById('titan-game');
        const ctx = canvas.getContext('2d');
        let active = false, score = 0, y = 0, vy = 0, obstacles = [], frame = 0;

        function startEngine() {
            active = true; score = 0; obstacles = []; y = 0;
            document.getElementById('overlay').style.display = 'none';
            log("Engine inicializada no modo " + (window.innerWidth < 1024 ? "MOBILE" : "DESKTOP"));
            gameLoop();
        }

        function jump() { if(y === 0) { vy = -18; log("Salto executado."); } }

        function gameLoop() {
            if(!active) return;
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            const floor = canvas.height - 60;
            ctx.clearRect(0,0,canvas.width, canvas.height);

            // Física
            vy += 0.9; y += vy;
            if(y > 0) { y = 0; vy = 0; }

            // Render Moto
            ctx.font = canvas.width < 600 ? "40px Arial" : "60px Arial";
            ctx.fillText("🏍️", 60, floor + y);

            // Obstáculos
            if(frame % 80 === 0) obstacles.push({x: canvas.width, t: "🚧"});
            obstacles.forEach((o, i) => {
                o.x -= (8 + score/1000);
                ctx.fillText(o.t, o.x, floor);
                if(o.x > 60 && o.x < 110 && y > -30) {
                    active = false;
                    document.getElementById('overlay').style.display = 'flex';
                    log("COLISÃO DETECTADA.");
                }
                if(o.x < -50) { obstacles.splice(i, 1); score += 50; }
            });

            document.getElementById('score').innerText = score.toString().padStart(4, '0');
            frame++; requestAnimationFrame(gameLoop);
        }

        // --- INPUTS ---
        window.onkeydown = (e) => { if(e.code === 'Space') jump(); };
        document.getElementById('mobile-jump').ontouchstart = (e) => { e.preventDefault(); jump(); };

        function boot() {
            initBg();
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            log("Sistema CharlysOS v8 carregado.");
        }

        function toggleSound() {
            const r = document.getElementById('radio');
            r.paused ? r.play() : r.pause();
            log("Uplink de áudio alterado.");
        }

        window.onresize = initBg;
    </script>
</body>
</html>
