<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlys | Official Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4b2b; --secondary: #00d2ff; --neon: #39ff14; --bg: #050505; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0; 
            transition: 0.5s; 
        }

        /* Fundo Geométrico */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.4;
        }

        /* Animação de Entrada do Card */
        .card { 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(15px); 
            border-radius: 30px; 
            padding: 30px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 0 25px var(--primary); 
            border: 2px solid var(--primary); 
            transition: 0.3s;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid white; object-fit: cover; cursor: pointer; transition: 0.3s; }
        .profile-img:hover { transform: rotate(5deg) scale(1.1); }
        
        .username { color: var(--secondary); font-size: 14px; display: block; margin-bottom: 10px; font-weight: bold; }
        .bio { font-size: 14px; color: #ccc; line-height: 1.6; margin: 15px 0; }

        .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { 
            padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; 
            color: white; display: flex; align-items: center; justify-content: center; 
            gap: 8px; font-size: 14px; transition: 0.3s; position: relative; overflow: hidden;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-insta { background: #E1306C; } .btn-whats { background: #25D366; } .btn-yt { background: #ff0000; grid-column: span 2; }

        /* JOGO */
        #game-area { margin-top: 30px; width: 90%; max-width: 400px; height: 150px; background: rgba(0,0,0,0.9); border: 2px solid #333; border-radius: 20px; position: relative; overflow: hidden; touch-action: none; cursor: pointer; }
        #player { position: absolute; bottom: 5px; left: 30px; font-size: 35px; transform: scaleX(-1); line-height: 1; }
        #obstacle { position: absolute; bottom: 5px; right: -50px; font-size: 25px; line-height: 1; }
        #road { position: absolute; bottom: 0; width: 200%; height: 2px; background: repeating-linear-gradient(90deg, #444 0, #444 20px, transparent 20px, transparent 40px); }
        .moving { animation: road-move 0.5s linear infinite; }
        @keyframes road-move { from { left: 0; } to { left: -40px; } }
        #game-msg { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; font-weight: bold; color: var(--neon); text-align: center; }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="card" id="main-card">
    <img src="20260207_132012[1].jpg" class="profile-img" onclick="changeRGB()" title="Mudar LED">
    <h1 style="margin: 10px 0 5px;">CHARLYS</h1>
    <span class="username">@inimigo_do_amigo.ofc</span>
    
    <p class="bio">
        Piloto de <b>Titan 98</b> 🏍️. No PC, domino as estradas no <b>ETS2</b> e toco o terror no <b>GTA V</b>. 
        Sou animado, parceiro e de boa compreensão. Café na garrafa é lei! ☕
    </p>

    <div class="links-grid">
        <a href="https://instagram.com/inimigo_do_amigo.ofc" class="btn btn-insta" target="_blank"><i class="fab fa-instagram"></i> Insta</a>
        <a href="https://wa.me/5569992919920" class="btn btn-whats" target="_blank"><i class="fab fa-whatsapp"></i> Whats</a>
        <a href="https://youtu.be/7SGmdnFT3oU" class="btn btn-yt" target="_blank"><i class="fas fa-truck"></i> Ver Gameplays</a>
    </div>

    <div style="margin-top: 15px; font-size: 12px; opacity: 0.7;" onclick="addCoffee()">
        ☕ Café servido: <span id="coffee-count">0</span>
    </div>
</div>

<div id="game-area" onmousedown="handleAction(event)" ontouchstart="handleAction(event)">
    <div id="game-msg">TOQUE PARA ACELERAR A TITAN <br> <small style="color:#888">RECORDE: <span id="hi">0</span> KM</small></div>
    <div id="road"></div>
    <div id="player">🏍️</div>
    <div id="obstacle">🚧</div>
    <div id="score" style="position: absolute; top: 10px; right: 15px; font-weight: bold;">0 KM</div>
</div>

<script>
    // --- Lógica do Fundo de Partículas ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 - 0.5;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary');
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function createParticles() {
        for (let i = 0; i < 60; i++) particles.push(new Particle());
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animateParticles);
    }

    initCanvas(); createParticles(); animateParticles();
    window.onresize = initCanvas;

    // --- Lógica do Jogo e Funções ---
    let playing = false, score = 0, jumping = false;
    let hi = localStorage.getItem('hi') || 0;
    let coffees = localStorage.getItem('coffees') || 0;
    
    document.getElementById('hi').innerText = hi;
    document.getElementById('coffee-count').innerText = coffees;

    const p = document.getElementById("player"), o = document.getElementById("obstacle"), 
          r = document.getElementById("road"), m = document.getElementById("game-msg"), 
          s = document.getElementById("score");

    function handleAction(e) { e.preventDefault(); if(!playing) start(); else jump(); }

    function start() {
        playing = true; score = 0; s.innerText = "0 KM";
        m.style.display = "none"; r.classList.add("moving");
        o.style.right = "-50px"; loop();
    }

    function jump() {
        if(jumping) return; jumping = true;
        let alt = 5;
        let up = setInterval(() => {
            if(alt >= 95) { clearInterval(up);
                let down = setInterval(() => {
                    if(alt <= 5) { clearInterval(down); jumping = false; alt = 5; }
                    alt -= 10; p.style.bottom = (alt < 5 ? 5 : alt) + "px";
                }, 12);
            }
            alt += 12; p.style.bottom = alt + "px";
        }, 12);
    }

    function loop() {
        if(!playing) return;
        let oR = parseInt(window.getComputedStyle(o).right);
        let pB = parseInt(p.style.bottom) || 5;
        let speed = window.innerWidth < 600 ? 8 : 11;

        if(oR > 420) { o.style.right = "-50px"; score += 10; s.innerText = score + " KM"; } 
        else { o.style.right = (oR + speed) + "px"; }

        if(oR > 310 && oR < 355 && pB < 45) die();
        else requestAnimationFrame(loop);
    }

    function die() {
        playing = false; r.classList.remove("moving");
        if(score > hi) { hi = score; localStorage.setItem('hi', hi); }
        m.innerHTML = `BATEU A TITAN! <br> ${score} KM <br> RECORDE: ${hi} <br> RECOMEÇAR`;
        m.style.display = "flex"; document.getElementById('hi').innerText = hi;
        p.style.bottom = "5px"; jumping = false;
    }

    function changeRGB() {
        const colors = ['#ff4b2b', '#39ff14', '#00d2ff', '#bc13fe'];
        let cur = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim().toLowerCase();
        let next = colors[(colors.indexOf(cur) + 1) % colors.length] || colors[1];
        document.documentElement.style.setProperty('--primary', next);
        document.getElementById('main-card').style.boxShadow = `0 0 25px ${next}`;
    }

    function addCoffee() {
        coffees++; localStorage.setItem('coffees', coffees);
        document.getElementById('coffee-count').innerText = coffees;
    }

    window.onkeydown = (e) => { if(e.code === "Space") { e.preventDefault(); handleAction(e); } };
</script>
</body>
</html>
