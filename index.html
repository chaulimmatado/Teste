<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARLYS_GOD_MODE_V11</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #00f2ff; /* Cor inicial: Ciano */
            --s: #ff0055;
            --bg: #030305;
            --glow: 0 0 25px var(--p);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* --- BACKGROUND DE PARTÍCULAS MAGNÉTICAS --- */
        #particle-canvas {
            position: fixed; top: 0; left: 0; z-index: -1;
            filter: drop-shadow(0 0 5px var(--p));
        }

        /* --- LAYOUT PRINCIPAL --- */
        .wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- HEADER --- */
        header {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--p);
            padding: 15px;
            text-align: center;
            box-shadow: var(--glow);
            border-radius: 4px;
        }

        /* --- PERFIL INTERATIVO (O COMANDANTE) --- */
        .profile-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .photo-frame {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 4px solid var(--p);
            padding: 5px;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--glow);
            position: relative;
        }

        .photo-frame:hover { transform: scale(1.1) rotate(5deg); border-color: var(--s); }
        .photo-frame:active { transform: scale(0.9); }

        .photo-frame img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* --- BOTÕES COM EFEITO MOUSE E GLOW --- */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
        }

        .cyber-btn {
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--p);
            color: var(--p);
            padding: 15px;
            font-family: 'Orbitron';
            text-decoration: none;
            text-align: center;
            font-size: 11px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .cyber-btn:hover {
            background: var(--p);
            color: #000;
            box-shadow: 0 0 30px var(--p);
            transform: translateY(-3px);
        }

        /* --- MOTOR DE JOGO ADAPTATIVO --- */
        .game-viewport {
            flex: 1;
            background: #000;
            border: 2px solid var(--p);
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,242,255,0.2);
            overflow: hidden;
        }

        #game-canvas { width: 100%; height: 100%; }

        .game-ui {
            position: absolute; top: 15px; width: 100%;
            padding: 0 20px; display: flex; justify-content: space-between;
            font-family: 'Orbitron'; pointer-events: none;
        }

        /* BOTÃO DE SALTO TOUCH (SÓ MOBILE) */
        .mobile-jump-zone {
            display: none;
            position: absolute; inset: 0;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .mobile-jump-zone { display: block; }
            .links-grid { grid-template-columns: 1fr; }
        }

        /* MENSAGEM DE START */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 20;
        }

        /* --- ESTILO ADICIONAL PARA O PLAYER DE RÁDIO --- */
        .radio-control {
            margin-top: 15px;
            width: 100%;
        }

    </style>
</head>
<body onload="initSystem()">

    <canvas id="particle-canvas"></canvas>

    <div class="wrapper">
        <header>
            <h1 style="font-family: 'Orbitron'; font-size: 14px; letter-spacing: 5px; color: var(--p);">TITAN_NEURAL_STORM // V11</h1>
        </header>

        <section class="profile-area">
            <div class="photo-frame" onclick="changeTheme()" title="Clique para mudar a cor do sistema!">
                <img src="20260207_132012[1].jpg" alt="Charlys">
            </div>
            <h2 style="font-family: 'Orbitron'; margin-top: 15px; letter-spacing: 2px;">CHARLYS</h2>
            
            <div class="links-grid">
                <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="cyber-btn"><i class="fab fa-instagram"></i> INSTAGRAM</a>
                <a href="https://wa.me/5569992919920" target="_blank" class="cyber-btn"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                
                <div id="radioBtn" onclick="toggleRadio()" class="cyber-btn" style="grid-column: span 2;">
                    <i class="fas fa-broadcast-tower"></i> <span id="radioStatus">ATIVAR_RADIO_CYBERPUNK</span>
                </div>
            </div>
        </section>

        <div class="game-viewport" id="gameBox">
            <div class="game-ui">
                <div style="color: var(--p);">SCORE: <span id="score">0000</span></div>
                <div style="color: var(--s);">FPS: <span id="fps">120</span></div>
            </div>
            
            <canvas id="game-canvas"></canvas>
            <div class="mobile-jump-zone" id="touchZone"></div>

            <div id="boot" class="overlay">
                <h2 style="font-family:'Orbitron'; color: var(--p); margin-bottom: 20px;">SYSTEM_READY</h2>
                <button onclick="startGame()" class="cyber-btn" style="width: 200px;">ENGAGE_TITAN</button>
            </div>
        </div>
    </div>

    <audio id="cyberRadio" loop>
        <source src="https://stream.nightride.fm/nightride.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- CONTROLE DA RÁDIO ---
        const radio = document.getElementById('cyberRadio');
        const radioStatus = document.getElementById('radioStatus');
        let radioPlaying = false;

        function toggleRadio() {
            if (!radioPlaying) {
                radio.play().catch(e => console.log("Erro ao iniciar áudio: Requer interação do usuário."));
                radioStatus.innerText = "RADIO_ONLINE // DISCONECT";
                radioPlaying = true;
                document.getElementById('radioBtn').style.borderColor = "var(--s)";
                document.getElementById('radioBtn').style.color = "var(--s)";
            } else {
                radio.pause();
                radioStatus.innerText = "ATIVAR_RADIO_CYBERPUNK";
                radioPlaying = false;
                document.getElementById('radioBtn').style.borderColor = "var(--p)";
                document.getElementById('radioBtn').style.color = "var(--p)";
            }
        }

        // --- MOTOR DE PARTÍCULAS MAGNÉTICAS ---
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function initParticles() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<120; i++) {
                particles.push({
                    x: Math.random() * pCanvas.width,
                    y: Math.random() * pCanvas.height,
                    size: Math.random() * 2 + 1,
                    vx: Math.random() * 2 - 1,
                    vy: Math.random() * 2 - 1
                });
            }
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            let color = getComputedStyle(document.documentElement).getPropertyValue('--p');
            pCtx.fillStyle = color;
            pCtx.strokeStyle = color;

            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > pCanvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > pCanvas.height) p.vy *= -1;

                let dx = mouse.x - p.x;
                let dy = mouse.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 150) {
                    p.x += dx * 0.02;
                    p.y += dy * 0.02;
                    pCtx.beginPath(); pCtx.moveTo(p.x, p.y); pCtx.lineTo(mouse.x, mouse.y);
                    pCtx.globalAlpha = 0.2; pCtx.stroke(); pCtx.globalAlpha = 1;
                }

                pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); pCtx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        // --- TROCA DE TEMA ---
        const themes = ['#00f2ff', '#ff0055', '#bcff00', '#ffaa00', '#a200ff'];
        let currentTheme = 0;
        function changeTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            document.documentElement.style.setProperty('--p', themes[currentTheme]);
            initParticles();
        }

        // --- TITAN GAME ENGINE ---
        const gCanvas = document.getElementById('game-canvas');
        const gCtx = gCanvas.getContext('2d');
        let playing = false, score = 0, py = 0, pv = 0, obstacles = [], frame = 0;

        function startGame() {
            playing = true; score = 0; obstacles = []; py = 0;
            document.getElementById('boot').style.display = 'none';
            // Tenta iniciar a rádio automaticamente ao começar o jogo se ainda estiver desligada
            if(!radioPlaying) toggleRadio();
            gameLoop();
        }

        function gameJump() { if(py === 0 && playing) pv = -15; }

        function gameLoop() {
            if(!playing) return;
            gCanvas.width = gCanvas.parentElement.offsetWidth;
            gCanvas.height = gCanvas.parentElement.offsetHeight;
            let floor = gCanvas.height - 50;
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);

            pv += 0.8; py += pv;
            if(py > 0) { py = 0; pv = 0; }

            gCtx.shadowBlur = 20; gCtx.shadowColor = themes[currentTheme];
            gCtx.font = "40px Arial";
            gCtx.fillText("🏍️", 50, floor + py);
            gCtx.shadowBlur = 0;

            if(frame % 80 === 0) obstacles.push({ x: gCanvas.width });
            obstacles.forEach((o, i) => {
                o.x -= (8 + score/1000);
                gCtx.fillText("🚧", o.x, floor);
                if(o.x > 40 && o.x < 80 && py > -25) {
                    playing = false;
                    document.getElementById('boot').style.display = 'flex';
                    document.getElementById('boot').innerHTML = `<h2 style="color:var(--s)">CRASHED</h2><button onclick="startGame()" class="cyber-btn">REBOOT</button>`;
                }
                if(o.x < -50) { obstacles.splice(i, 1); score += 100; }
            });

            document.getElementById('score').innerText = score.toString().padStart(4, '0');
            frame++; requestAnimationFrame(gameLoop);
        }

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('touchstart', e => { 
            mouse.x = e.touches[0].clientX; 
            mouse.y = e.touches[0].clientY; 
            gameJump(); 
        });
        window.addEventListener('keydown', e => { if(e.code === 'Space') gameJump(); });
        window.onresize = initParticles;

        function initSystem() {
            initParticles();
            animateParticles();
        }
    </script>
</body>
</html>
