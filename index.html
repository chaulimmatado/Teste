<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlys | Official Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4b2b;
            --secondary: #00d2ff;
            --neon-green: #39ff14;
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .bento-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 95%;
            max-width: 500px;
        }

        .bento-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 20px;
            transition: 0.3s;
        }

        .profile-block { grid-column: span 2; text-align: center; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 10px; }

        /* GAME STYLES */
        .game-block {
            grid-column: span 2;
            height: 200px;
            background: #000;
            position: relative;
            overflow: hidden;
            border: 2px solid #222;
            cursor: pointer;
            padding: 0;
        }

        #player-sprite {
            position: absolute;
            bottom: 20px;
            left: 50px;
            font-size: 45px;
            transform: scaleX(-1);
            z-index: 10;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px; height: 50px; /* Box fixo para cálculo */
        }

        #obstacle-sprite {
            position: absolute;
            bottom: 20px;
            right: -60px;
            font-size: 30px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px; height: 40px;
        }

        .road-line {
            position: absolute;
            bottom: 0; width: 200%; height: 4px;
            background: repeating-linear-gradient(90deg, #333 0, #333 30px, transparent 30px, transparent 60px);
        }

        #game-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 30;
            color: var(--neon-green);
            text-align: center;
            font-weight: bold;
        }

        .social-block { grid-column: span 1; display: grid; gap: 10px; }
        .btn-social {
            padding: 15px; border-radius: 15px; color: #fff; text-decoration: none;
            text-align: center; font-weight: bold; font-size: 14px;
        }
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }
        .whats { background: #25D366; }

        .coffee-block { grid-column: span 1; text-align: center; cursor: pointer; }
        #coffee-val { font-size: 30px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="bento-container">
    <div class="bento-card profile-block">
        <img src="20260207_132012[1].jpg" class="profile-img" alt="Charlys">
        <h1>CHARLYS</h1>
        <p style="color: var(--secondary)">@inimigo_do_amigo.ofc</p>
    </div>

    <div class="bento-card game-block" id="game-container">
        <div id="game-overlay">
            <span>TOQUE PARA ACELERAR A TITAN</span>
            <small style="color: #666; display: block; margin-top: 10px;">RECORDE: <span id="hi-score">0</span> KM</small>
        </div>
        <div id="game-score" style="position: absolute; top: 15px; left: 20px; font-weight: bold; z-index: 20;">0 KM</div>
        <div id="road" class="road-line"></div>
        <div id="player-sprite">🏍️</div>
        <div id="obstacle-sprite">🚧</div>
    </div>

    <div class="social-block">
        <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="btn-social insta">INSTAGRAM</a>
        <a href="https://wa.me/5569992919920" target="_blank" class="btn-social whats">WHATSAPP</a>
    </div>

    <div class="bento-card coffee-block" onclick="addCoffee()">
        <span>☕</span>
        <span id="coffee-val">0</span>
        <small>CAFÉS</small>
    </div>
</div>

<script>
    /* --- BACKGROUND PARTICLES --- */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function initBg() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<60; i++) particles.push({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            s: Math.random()*2, v: Math.random()*0.5 + 0.1
        });
    }
    function drawBg() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        particles.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y += p.v; if(p.y > canvas.height) p.y = -10;
        });
        requestAnimationFrame(drawBg);
    }
    initBg(); drawBg();

    /* --- GAME ENGINE (HITBOX FIXED) --- */
    let playing = false, score = 0, hi = localStorage.getItem('charlys_hi') || 0;
    let jump = false, py = 0, pVel = 0;
    let ox = -60, speed = 6;
    
    const gravity = 0.8, force = -14;
    const player = document.getElementById('player-sprite');
    const obstacle = document.getElementById('obstacle-sprite');
    const road = document.getElementById('road');
    const overlay = document.getElementById('game-overlay');
    const scoreText = document.getElementById('game-score');
    
    document.getElementById('hi-score').innerText = hi;

    function loop() {
        if(!playing) return;

        // FÍSICA DO PULO
        pVel += gravity;
        py -= pVel;
        if(py <= 0) { py = 0; pVel = 0; jump = false; }
        player.style.transform = `scaleX(-1) translateY(${-py}px)`;

        // MOVIMENTO OBSTÁCULO
        speed = 7 + (score / 200);
        ox += speed;
        if(ox > 550) { ox = -60; score += 10; scoreText.innerText = score + " KM"; }
        obstacle.style.right = ox + 'px';

        // COLISÃO CALIBRADA (SISTEMA DE HITBOX GEOMÉTRICA)
        // O player está fixo a 50px da esquerda. O container tem ~500px.
        // ox é a distância da DIREITA.
        // Convertendo ox para posição da esquerda:
        let obstacleLeft = 500 - ox - 40; 
        let playerLeft = 50;
        
        // Verificação de proximidade (Ajuste fino de pixels aqui)
        let horizontalMatch = (obstacleLeft < playerLeft + 45) && (obstacleLeft + 30 > playerLeft);
        let verticalMatch = (py < 35); // Se o pulo for menor que 35px de altura, bate.

        if(horizontalMatch && verticalMatch) {
            gameOver();
            return;
        }

        // EVOLUÇÃO
        if(score >= 500) player.innerText = '🚛';
        else if(score >= 200) player.innerText = '🚀';
        else player.innerText = '🏍️';

        road.style.left = (-(Date.now()/10) % 60) + "px";
        requestAnimationFrame(loop);
    }

    function gameOver() {
        playing = false;
        if(score > hi) { hi = score; localStorage.setItem('charlys_hi', hi); }
        document.getElementById('hi-score').innerText = hi;
        overlay.innerHTML = `BATEU A TITAN!<br>${score} KM<br><small>TOQUE PARA RECOMEÇAR</small>`;
        overlay.style.display = 'flex';
    }

    document.getElementById('game-container').addEventListener('mousedown', (e) => {
        e.preventDefault();
        if(!playing) {
            playing = true; score = 0; ox = -60; py = 0;
            overlay.style.display = 'none';
            scoreText.innerText = "0 KM";
            loop();
        } else if(!jump) {
            jump = true; pVel = force;
        }
    });

    function addCoffee() {
        let val = parseInt(document.getElementById('coffee-val').innerText) + 1;
        document.getElementById('coffee-val').innerText = val;
    }
</script>
</body>
</html>
