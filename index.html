<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROOT@CHARLYS_SYSTEM:~# [AUDIO_ENABLED]</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        /* [Mantendo os estilos anteriores e adicionando os de Áudio] */
        :root {
            --glow-red: #ff003c;
            --glow-blue: #00e5ff;
            --terminal-green: #00ff41;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(16, 16, 20, 0.95);
            --border-color: rgba(0, 229, 255, 0.2);
        }

        body {
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            padding: 15px;
            gap: 15px;
            overflow: hidden;
        }

        .dashboard { flex: 1; display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(12, 1fr); gap: 15px; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .panel-header { background: rgba(0, 229, 255, 0.1); padding: 5px 12px; font-size: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); }

        /* Estilo do Player de Música */
        .mod-music { grid-column: 9 / 13; grid-row: 5 / 9; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        .music-controls { display: flex; gap: 15px; margin-top: 15px; }
        .music-btn { background: transparent; border: 1px solid var(--glow-blue); color: var(--glow-blue); padding: 8px; cursor: pointer; transition: 0.3s; }
        .music-btn:hover { background: var(--glow-blue); color: #000; }
        
        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 40px; margin-top: 10px; }
        .bar { width: 5px; background: var(--glow-blue); height: 5px; transition: height 0.1s; }
        .playing .bar { animation: dance 0.5s infinite alternate; }

        @keyframes dance {
            0% { height: 5px; }
            100% { height: 35px; }
        }

        /* [Resto dos estilos do motor de jogo e terminal permanecem iguais] */
        .mod-engine { grid-column: 1 / 9; grid-row: 1 / 9; background: #000; }
        #titanCanvas { width: 100%; height: 100%; }
        .mod-terminal { grid-column: 1 / 9; grid-row: 9 / 13; padding: 15px; font-size: 12px; color: var(--terminal-green); }
        #term-output { height: 100px; overflow-y: auto; }
        input { background: transparent; border: none; color: var(--terminal-green); outline: none; width: 100%; }
    </style>
</head>
<body onload="bootSystem()">

    <main class="dashboard">
        
        <section class="panel mod-engine">
            <div class="panel-header"><span>TITAN_CORE_V5</span></div>
            <canvas id="titanCanvas"></canvas>
        </section>

        <section class="panel mod-terminal">
            <div class="panel-header"><span>COMMAND_PROMPT</span></div>
            <div id="term-output"></div>
            <div style="display:flex">> <input type="text" id="term-input" placeholder="Type 'play' to start music..."></div>
        </section>

        <section class="panel mod-music" id="music-panel">
            <div class="panel-header"><span>NEON_RADIO_FM</span></div>
            <p style="font-size: 10px; opacity: 0.5;">STREAMING FROM: NIGHTDRIVE.EXE</p>
            <h4 id="song-title" style="color: var(--glow-blue); margin-top: 5px;">SYNTHWAVE_STATION</h4>
            
            <div class="visualizer" id="viz">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
                <div class="bar" style="animation-delay: 0.4s"></div>
                <div class="bar" style="animation-delay: 0.1s"></div>
            </div>

            <div class="music-controls">
                <button class="music-btn" onclick="toggleMusic()"><i class="fas fa-play" id="play-icon"></i></button>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume()">
            </div>
            
            <audio id="bg-audio" loop>
                <source src="https://stream.nightride.fm/nightride.mp3" type="audio/mpeg">
            </audio>
        </section>

    </main>

    <script>
        const audio = document.getElementById('bg-audio');
        const playIcon = document.getElementById('play-icon');
        const viz = document.getElementById('viz');
        const termInput = document.getElementById('term-input');
        const termOutput = document.getElementById('term-output');

        function bootSystem() {
            logTerminal("Audio Driver: NIGHTRIDE_FM detectado.");
            logTerminal("Digite 'play' para iniciar a imersão sonora.");
        }

        function logTerminal(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            termOutput.appendChild(div);
            termOutput.scrollTop = termOutput.scrollHeight;
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                playIcon.className = "fas fa-pause";
                viz.classList.add('playing');
                logTerminal("Uplink de áudio estabelecido. Aproveite a viagem.");
            } else {
                audio.pause();
                playIcon.className = "fas fa-play";
                viz.classList.remove('playing');
                logTerminal("Áudio suspenso.");
            }
        }

        function updateVolume() {
            audio.volume = document.getElementById('volume').value;
        }

        // Comandos de Terminal para Música
        termInput.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                let cmd = termInput.value.toLowerCase();
                if(cmd === 'play') toggleMusic();
                if(cmd === 'stop') toggleMusic();
                if(cmd === 'volume up') { audio.volume = Math.min(1, audio.volume + 0.1); logTerminal("Volume aumentado."); }
                termInput.value = "";
            }
        });

        /* [Aqui entraria o código da animação da moto que já fizemos, 
           mas agora com a função de mutar o som se bater, se quiser!] */

    </script>
</body>
</html>
