<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARLYS_OS_V9 // ESTÁVEL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff0055;
            --bg: #0a0a0c;
            --panel: rgba(20, 20, 25, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- BACKGROUND --- */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
            z-index: -1;
        }

        /* --- HEADER --- */
        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon);
            background: var(--panel);
        }

        .sys-title { font-family: 'Orbitron'; font-weight: 900; color: var(--neon); letter-spacing: 2px; font-size: 1.2rem; }

        /* --- PERFIL --- */
        .profile-section {
            padding: 30px 20px;
            text-align: center;
        }

        .avatar-wrapper {
            width: 150px; height: 150px;
            margin: 0 auto 20px;
            border: 3px solid var(--neon);
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .avatar-wrapper img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .name { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 5px; }
        .tag { color: var(--pink); font-size: 0.8rem; font-weight: bold; margin-bottom: 25px; }

        /* --- BOTÕES (LINKS) --- */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 0 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .cyber-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            text-decoration: none;
            font-family: 'Orbitron';
            font-weight: bold;
            transition: 0.3s;
            border-radius: 5px;
        }

        .cyber-button:active {
            background: var(--neon);
            color: #000;
        }

        /* --- ÁREA DO JOGO (SIMULADOR) --- */
        .game-container {
            margin: 30px 10px;
            background: #000;
            border: 1px solid var(--pink);
            height: 250px;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; }

        .game-hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 15px;
            font-family: 'Orbitron'; font-size: 0.8rem; pointer-events: none;
        }

        .game-over-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- FOOTER / AUDIO --- */
        footer {
            margin-top: auto;
            padding: 20px;
            background: var(--panel);
            text-align: center;
        }

        .music-btn {
            background: var(--pink);
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: 'Orbitron';
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body onload="init()">

    <div class="stars"></div>

    <header>
        <div class="sys-title">CHARLYS_SYSTEM_v9</div>
    </header>

    <main>
        <section class="profile-section">
            <div class="avatar-wrapper">
                <img src="20260207_132012[1].jpg" alt="Charlys">
            </div>
            <h1 class="name">CHARLYS</h1>
            <p class="tag">[ SUPREME OPERATOR ]</p>

            <div class="links-container">
                <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="cyber-button">
                    <i class="fab fa-instagram"></i> INSTAGRAM
                </a>
                <a href="https://wa.me/5569992919920" target="_blank" class="cyber-button">
                    <i class="fab fa-whatsapp"></i> WHATSAPP
                </a>
            </div>
        </section>

        <div class="game-container" id="gameBox">
            <div class="game-hud">
                <div style="color:var(--neon)">SCORE: <span id="scoreVal">0</span></div>
                <div id="status" style="color:var(--pink)">STANDBY</div>
            </div>
            
            <canvas id="gameCanvas"></canvas>

            <div id="startScreen" class="game-over-screen">
                <button onclick="startGame()" class="cyber-button" style="background: var(--neon); color:#000; width: 180px;">INICIAR TITAN</button>
                <p style="font-size: 0.6rem; margin-top: 10px; opacity: 0.5;">TOQUE NA TELA PARA PULAR</p>
            </div>
        </div>
    </main>

    <footer>
        <button class="music-btn" onclick="toggleAudio()">
            <i class="fas fa-music"></i> <span id="musicText">LIGAR RÁDIO</span>
        </button>
        <audio id="bgAudio" loop src="https://stream.nightride.fm/nightride.mp3"></audio>
        <p style="font-size: 0.5rem; margin-top: 10px; opacity: 0.3;">© 2026 CHARLYS_OS_QUANTUM</p>
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let playing = false, score = 0, y = 0, vy = 0, obstacles = [], frame = 0;

        function init() {
            canvas.width = document.getElementById('gameBox').offsetWidth;
            canvas.height = document.getElementById('gameBox').offsetHeight;
        }

        function startGame() {
            playing = true; score = 0; obstacles = []; y = 0;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('status').innerText = "LIVE";
            gameLoop();
        }

        function jump() {
            if(y === 0 && playing) vy = -12;
        }

        // Toque na tela para pular (Mobile)
        document.getElementById('gameBox').addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // Barra de espaço para pular (PC)
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') jump();
        });

        function gameLoop() {
            if(!playing) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const floor = canvas.height - 40;

            // Física
            vy += 0.7; y += vy;
            if(y > 0) { y = 0; vy = 0; }

            // Desenhar Moto
            ctx.font = "40px Arial";
            ctx.fillText("🏍️", 40, floor + y);

            // Obstáculos
            if(frame % 90 === 0) obstacles.push({x: canvas.width});
            obstacles.forEach((o, i) => {
                o.x -= 6;
                ctx.fillText("🚧", o.x, floor);

                // Colisão
                if(o.x > 30 && o.x < 70 && y > -25) {
                    gameOver();
                }
                if(o.x < -50) { obstacles.splice(i, 1); score += 100; }
            });

            document.getElementById('scoreVal').innerText = score;
            frame++; requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            playing = false;
            document.getElementById('startScreen').style.display = 'flex';
            document.getElementById('startScreen').innerHTML = `<h2 style="color:var(--pink); margin-bottom:15px;">CRASH!</h2><button onclick="startGame()" class="cyber-button" style="background:var(--neon); color:#000;">TENTAR DE NOVO</button>`;
        }

        function toggleAudio() {
            const audio = document.getElementById('bgAudio');
            const btnText = document.getElementById('musicText');
            if(audio.paused) {
                audio.play();
                btnText.innerText = "PAUSAR RÁDIO";
            } else {
                audio.pause();
                btnText.innerText = "LIGAR RÁDIO";
            }
        }
    </script>
</body>
</html>
