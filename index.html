<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Charlys | Official Profile</title>
    <meta name="description" content="Piloto de Titan 98 e Gamer. Confira minhas redes e bata meu recorde no mini-game!">
    <meta property="og:title" content="Charlys | Official">
    <meta property="og:description" content="Piloto de Titan 98 🏍️ | ETS2 & GTA V">
    <meta property="og:image" content="20260207_132012[1].jpg">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #ff4b2b; --secondary: #00d2ff; --neon: #39ff14; --bg: #050505; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0;
        }

        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

        /* Borda RGB Animada */
        .rainbow-border {
            position: relative;
            padding: 3px;
            border-radius: 32px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: move-bg 10s linear infinite;
            width: 90%;
            max-width: 400px;
        }

        @keyframes move-bg { 0% { background-position: 0 0; } 50% { background-position: 400% 0; } 100% { background-position: 0 0; } }

        .card { 
            background: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(20px); 
            border-radius: 30px; 
            padding: 30px; 
            text-align: center;
            box-sizing: border-box;
        }

        /* Hover Glow nos botões */
        .btn { 
            padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; 
            color: white; display: flex; align-items: center; justify-content: center; 
            gap: 8px; font-size: 14px; transition: 0.3s;
        }
        .btn:hover { 
            transform: scale(1.03); 
            box-shadow: 0 0 15px var(--primary);
            filter: brightness(1.2);
        }
        .btn-insta { background: #E1306C; } .btn-whats { background: #25D366; } .btn-yt { background: #ff0000; grid-column: span 2; }

        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid white; object-fit: cover; cursor: pointer; transition: 0.5s; }
        .profile-img:active { transform: scale(0.9) rotate(-10deg); }

        /* GAME AREA COM SCANLINES CRT */
        #game-area { 
            margin-top: 30px; width: 90%; max-width: 400px; height: 150px; 
            background: #000; border: 2px solid #222; border-radius: 20px; 
            position: relative; overflow: hidden; touch-action: none;
        }
        
        #game-area::before {
            content: " ";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 5; pointer-events: none;
        }

        /* Animação de Vibração da Moto */
        @keyframes vibrate {
            0% { transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(-2px); }
            100% { transform: scaleX(-1) translateY(0); }
        }
        .vibrating { animation: vibrate 0.1s infinite; }

        #player { position: absolute; bottom: 5px; left: 30px; font-size: 35px; transform: scaleX(-1); line-height: 1; z-index: 2; }
        #obstacle { position: absolute; bottom: 5px; right: -50px; font-size: 25px; line-height: 1; z-index: 2; }
        #road { position: absolute; bottom: 0; width: 200%; height: 2px; background: repeating-linear-gradient(90deg, #444 0, #444 20px, transparent 20px, transparent 40px); }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="rainbow-border">
    <div class="card" id="main-card">
        <img src="20260207_132012[1].jpg" class="profile-img" onclick="changeRGB()" title="Mudar Estilo">
        <h1 style="margin: 10px 0 5px; letter-spacing: 2px;">CHARLYS</h1>
        <span style="color: var(--secondary); font-size: 13px; font-weight: bold;">@inimigo_do_amigo.ofc</span>
        
        <p style="font-size: 14px; color: #ccc; line-height: 1.5; margin: 15px 0;">
            Piloto de <b>Titan 98</b> 🏍️. Pro no <b>ETS2</b>. <br>
            Café na garrafa e motor acelerado! ☕
        </p>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <a href="https://instagram.com/inimigo_do_amigo.ofc" class="btn btn-insta" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            <a href="https://wa.me/5569992919920" class="btn btn-whats" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="https://youtu.be/7SGmdnFT3oU" class="btn btn-yt" target="_blank"><i class="fas fa-play"></i> Gameplays</a>
        </div>

        <div style="margin-top: 15px; font-size: 11px; opacity: 0.5; cursor: pointer;" onclick="addCoffee()">
            ☕ CAFÉS CONSUMIDOS: <span id="coffee-count">0</span>
        </div>
    </div>
</div>

<div id="game-area" onmousedown="handleAction(event)" ontouchstart="handleAction(event)">
    <div id="game-msg" style="position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: var(--neon); font-weight: bold; text-align: center;">
        INICIAR CORRIDA <br> <small style="color:#666">RECORDE: <span id="hi">0</span> KM</small>
    </div>
    <div id="road"></div>
    <div id="player" class="vibrating">🏍️</div>
    <div id="obstacle">🚧</div>
    <div id="score" style="position: absolute; top: 10px; right: 15px; font-weight: bold; z-index: 6;">0 KM</div>
</div>

<script>
    // Partículas do Fundo
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    class Pt {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.vx = Math.random()-0.5; this.vy = Math.random()-0.5; }
        step() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx*=-1; if(this.y<0||this.y>canvas.height)this.vy*=-1; }
        draw() { ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(this.x,this.y,1.5,0,Math.PI*2); ctx.fill(); }
    }
    for(let i=0;i<50;i++) pts.push(new Pt());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{p.step();p.draw();}); requestAnimationFrame(anim); }
    init(); anim(); window.onresize = init;

    // Lógica do Jogo
    let playing = false, score = 0, jumping = false, gameSpeed = 8;
    const p = document.getElementById("player"), o = document.getElementById("obstacle"), 
          r = document.getElementById("road"), m = document.getElementById("game-msg"), s = document.getElementById("score");

    function handleAction(e) { e.preventDefault(); if(!playing) start(); else jump(); }

    function start() {
        playing = true; score = 0; gameSpeed = 8;
        m.style.display = "none"; r.style.animationDuration = "0.5s";
        r.classList.add("moving"); o.style.right = "-50px";
        loop();
    }

    function jump() {
        if(jumping) return; jumping = true;
        let alt = 5;
        let up = setInterval(() => {
            if(alt >= 90) { clearInterval(up);
                let down = setInterval(() => {
                    if(alt <= 5) { clearInterval(down); jumping = false; }
                    alt -= 9; p.style.bottom = Math.max(5, alt) + "px";
                }, 15);
            }
            alt += 11; p.style.bottom = alt + "px";
        }, 15);
    }

    function loop() {
        if(!playing) return;
        let oR = parseInt(window.getComputedStyle(o).right);
        let pB = parseInt(p.style.bottom) || 5;

        // Aumenta a velocidade gradualmente
        gameSpeed = 8 + (score / 100);
        r.style.animationDuration = (0.5 - (score/2000)) + "s";

        if(oR > 420) { 
            o.style.right = "-50px"; 
            score += 10; 
            s.innerText = score + " KM"; 
        } else { 
            o.style.right = (oR + gameSpeed) + "px"; 
        }

        if(oR > 310 && oR < 350 && pB < 40) die();
        else requestAnimationFrame(loop);
    }

    function die() {
        playing = false; r.classList.remove("moving");
        let hi = localStorage.getItem('hi') || 0;
        if(score > hi) localStorage.setItem('hi', score);
        m.innerHTML = `PERDEU O EQUILÍBRIO! <br> ${score} KM <br> RECORDE: ${localStorage.getItem('hi')} <br> <small>TOQUE PARA TENTAR DE NOVO</small>`;
        m.style.display = "flex";
        p.style.bottom = "5px";
    }

    function addCoffee() {
        let c = parseInt(localStorage.getItem('coffees') || 0) + 1;
        localStorage.setItem('coffees', c);
        document.getElementById('coffee-count').innerText = c;
    }
    document.getElementById('coffee-count').innerText = localStorage.getItem('coffees') || 0;
    document.getElementById('hi').innerText = localStorage.getItem('hi') || 0;

    function changeRGB() {
        const colors = ['#ff4b2b', '#39ff14', '#00d2ff', '#bc13fe'];
        let next = colors[Math.floor(Math.random() * colors.length)];
        document.documentElement.style.setProperty('--primary', next);
    }
</script>
</body>
</html>
