<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charlys | Legendary Hub</title>
    
    <meta name="theme-color" content="#020202">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ARQUITETURA DE CORES E TOKENS --- */
        :root {
            --p: #ff4b2b;        /* Neon Red */
            --s: #00d2ff;        /* Cyber Blue */
            --n: #39ff14;        /* Matrix Green */
            --bg: #020202;       /* Deep Black */
            --card: rgba(18, 18, 18, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* --- RESET PROFISSIONAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            padding: 40px 15px;
        }

        /* --- ENGINE DE FUNDO (STARFIELD) --- */
        #master-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        /* --- CONTAINER BENTO GRID --- */
        .bento-master {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(100px, auto);
            gap: 20px;
            width: 100%;
            max-width: 520px;
            z-index: 10;
        }

        /* Estilização Base dos Cards */
        .bento-item {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .bento-item:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--p);
            box-shadow: 0 0 40px rgba(255, 75, 43, 0.15);
        }

        /* --- COMPONENTES DE INTERFACE --- */
        
        /* Profile Section */
        .profile-card {
            grid-column: span 2;
            text-align: center;
            border-bottom: 4px solid var(--p);
        }

        .avatar-group {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg);
            z-index: 5;
            position: relative;
            cursor: pointer;
        }

        .avatar-ring {
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--p), var(--s), var(--n));
            animation: rotate 3s linear infinite;
            z-index: 1;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .medal {
            font-size: 22px;
            filter: grayscale(1) brightness(0.3);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .medal.active {
            filter: grayscale(0) brightness(1);
            transform: scale(1.3);
            text-shadow: 0 0 15px var(--p);
        }

        /* Game Section */
        .game-card {
            grid-column: span 2;
            height: 240px;
            padding: 0;
            background: #000;
            border: 2px solid #111;
        }

        #stage {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .hud-score {
            position: absolute;
            top: 25px; left: 25px;
            font-family: 'Monaco', monospace;
            font-weight: 900;
            font-size: 22px;
            color: var(--n);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
            z-index: 50;
        }

        #titan {
            position: absolute;
            bottom: 30px; left: 60px;
            font-size: 50px;
            transform: scaleX(-1);
            z-index: 40;
            line-height: 1;
        }

        #obstacle {
            position: absolute;
            bottom: 30px; right: -80px;
            font-size: 35px;
            z-index: 40;
        }

        .ground-line {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 6px;
            background: repeating-linear-gradient(90deg, #222 0, #222 40px, transparent 40px, transparent 80px);
        }

        .screen-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Buttons & Extras */
        .social-link {
            grid-column: span 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 70px;
            border-radius: 25px;
            font-size: 24px;
            color: white;
            transition: 0.3s;
            text-decoration: none;
        }

        .ig-theme { background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d); }
        .wa-theme { background: #25D366; }

        .coffee-counter {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #c-num { font-size: 35px; font-weight: 900; color: #6f4e37; }

        .shake { animation: shakeAnim 0.2s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<canvas id="master-canvas"></canvas>

<div class="bento-master">
    <section class="bento-item profile-card">
        <div class="badges">
            <span id="m-cafe" class="medal">☕</span>
            <span id="m-pilot" class="medal">🏆</span>
            <span id="m-social" class="medal">📡</span>
        </div>
        <div class="avatar-group">
            <div class="avatar-ring"></div>
            <img src="20260207_132012[1].jpg" class="avatar-img" alt="Charlys">
        </div>
        <h1 style="letter-spacing: 4px; font-weight: 900; font-size: 28px;">CHARLYS</h1>
        <p style="color: var(--s); font-size: 12px; font-weight: bold; margin-top: 5px;">LEGENDARY DRIVER • 2026</p>
    </section>

    <section class="bento-item game-card" id="game-zone">
        <div id="stage">
            <div id="score-display" class="hud-score">00000</div>
            <div id="ui-overlay" class="screen-overlay">
                <h2 style="color: var(--n); letter-spacing: 2px;">START ENGINE</h2>
                <p style="font-size: 10px; opacity: 0.5; margin-top: 10px;">RECORDE: <span id="hi-score">0</span> KM</p>
            </div>
            <div id="road" class="ground-line"></div>
            <div id="titan">🏍️</div>
            <div id="obstacle">🚧</div>
        </div>
    </section>

    <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="bento-item social-link ig-theme" onclick="checkSocial()">
        <i class="fab fa-instagram"></i>
    </a>
    <a href="https://wa.me/5569992919920" target="_blank" class="bento-item social-link wa-theme" onclick="checkSocial()">
        <i class="fab fa-whatsapp"></i>
    </a>

    <div class="bento-item coffee-counter" onclick="addCoffee()">
        <span style="font-size: 30px;">☕</span>
        <span id="c-num">0</span>
        <small style="font-size: 9px; font-weight: 900; opacity: 0.4;">CAFFEINE LEVEL</small>
    </div>

    <div class="bento-item" style="grid-column: span 1; display: flex; align-items: center; justify-content: center; text-align: center;">
        <p style="font-size: 9px; opacity: 0.3; font-weight: bold;">BUILT BY GEMINI<br>FOR THE BEST PILOT</p>
    </div>
</div>

<script>
    /* --- BACKGROUND ENGINE (NEBULA SYSTEM) ---
       Utiliza técnica de profundidade Z para estrelas.
    */
    const canvas = document.getElementById('master-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function setupCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1,
                opacity: Math.random()
            });
        }
    }

    function renderBg() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
            s.y += s.speed;
            if(s.y > canvas.height) s.y = -5;
        });
        requestAnimationFrame(renderBg);
    }
    window.addEventListener('resize', setupCanvas);
    setupCanvas(); renderBg();

    /* --- GAME LOGIC: TITAN LEGACY ENGINE ---
       Lógica de detecção AABB (Axis-Aligned Bounding Box) calibrada.
    */
    const GAME = {
        active: false,
        score: 0,
        high: localStorage.getItem('t_high') || 0,
        py: 0, 
        pVel: 0,
        jump: false,
        ox: -100,
        speed: 8,
        gravity: 0.8,
        power: -16
    };

    const elTitan = document.getElementById('titan');
    const elObstacle = document.getElementById('obstacle');
    const elRoad = document.getElementById('road');
    const elScore = document.getElementById('score-display');
    const elOverlay = document.getElementById('ui-overlay');
    const elZone = document.getElementById('game-zone');

    document.getElementById('hi-score').innerText = GAME.high;

    function runGame() {
        if(!GAME.active) return;

        // 1. Física de Movimento Vertical
        GAME.pVel += GAME.gravity;
        GAME.py -= GAME.pVel;
        if(GAME.py <= 0) {
            GAME.py = 0;
            GAME.pVel = 0;
            GAME.jump = false;
        }
        elTitan.style.transform = `scaleX(-1) translateY(${-GAME.py}px)`;

        // 2. Movimento do Obstáculo e Dificuldade Escalonada
        GAME.speed = 8 + (GAME.score / 200);
        GAME.ox += GAME.speed;
        
        if(GAME.ox > (elZone.offsetWidth + 100)) {
            GAME.ox = -80;
            GAME.score += 10;
            elScore.innerText = GAME.score.toString().padStart(5, '0');
        }
        elObstacle.style.right = GAME.ox + 'px';

        // 3. DETECÇÃO DE COLISÃO (HITBOX PRECISA)
        // Largura do container: elZone.offsetWidth (~480-500px)
        // Titan está fixo em left: 60px.
        // O obstáculo vem da direita (ox).
        const titanBox = { l: 60, r: 110, h: 45 }; 
        const obsPosLeft = elZone.offsetWidth - GAME.ox - 40;

        if(obsPosLeft > titanBox.l && obsPosLeft < titanBox.r && GAME.py < titanBox.h) {
            handleCrash();
            return;
        }

        // 4. Evolução do Veículo
        if(GAME.score >= 1000) { elTitan.innerText = '🚛'; activateMedal('m-pilot'); }
        else if(GAME.score >= 500) elTitan.innerText = '🚀';
        else elTitan.innerText = '🏍️';

        // 5. Animação da Estrada
        elRoad.style.left = (-(Date.now() / 8) % 80) + 'px';

        requestAnimationFrame(runGame);
    }

    function handleCrash() {
        GAME.active = false;
        elZone.classList.add('shake');
        setTimeout(() => elZone.classList.remove('shake'), 200);
        
        if(GAME.score > GAME.high) {
            GAME.high = GAME.score;
            localStorage.setItem('t_high', GAME.high);
        }
        
        document.getElementById('hi-score').innerText = GAME.high;
        elOverlay.innerHTML = `
            <h2 style="color: var(--p)">WASTED</h2>
            <p style="font-size:20px">${GAME.score} KM</p>
            <small style="margin-top:10px">CLIQUE PARA REPARAR</small>
        `;
        elOverlay.style.display = 'flex';
    }

    elZone.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if(!GAME.active) {
            GAME.active = true;
            GAME.score = 0;
            GAME.ox = -100;
            GAME.py = 0;
            elOverlay.style.display = 'none';
            elScore.innerText = "00000";
            runGame();
        } else if(!GAME.jump) {
            GAME.jump = true;
            GAME.pVel = GAME.power;
        }
    });

    /* --- SISTEMA DE PROGRESSÃO --- */
    let coffee = localStorage.getItem('t_coffee') || 0;
    document.getElementById('c-num').innerText = coffee;

    function addCoffee() {
        coffee++;
        localStorage.setItem('t_coffee', coffee);
        document.getElementById('c-num').innerText = coffee;
        if(coffee >= 50) activateMedal('m-cafe');
    }

    function checkSocial() {
        activateMedal('m-social');
    }

    function activateMedal(id) {
        document.getElementById(id).classList.add('active');
    }

    // Carregamento Inicial de Medalhas
    if(coffee >= 50) activateMedal('m-cafe');
    if(GAME.high >= 1000) activateMedal('m-pilot');
</script>

</body>
</html>
