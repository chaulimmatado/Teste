<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlys | Official Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4b2b;
            --secondary: #00d2ff;
            --neon-green: #39ff14;
            --bg: #050505;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.3);
            border: 2px solid var(--primary);
        }

        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            cursor: pointer;
            transition: 0.3s;
        }

        .profile-img:hover { transform: scale(1.1); border-radius: 20px; }

        .bio { font-size: 14px; color: #ccc; line-height: 1.6; margin: 15px 0; }

        .skill-bar { height: 8px; background: #222; border-radius: 4px; margin: 8px 0 15px; overflow: hidden; }
        .skill-progress { height: 100%; background: var(--secondary); box-shadow: 0 0 10px var(--secondary); transition: 2s; }

        .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; transition: 0.3s; }
        .btn-insta { background: #E1306C; }
        .btn-whats { background: #25D366; }
        .btn-yt { background: #ff0000; grid-column: span 2; }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        /* JOGO CALIBRADO PARA MOBILE */
        #game-area {
            margin-top: 30px;
            width: 90%;
            max-width: 400px;
            height: 150px;
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            touch-action: manipulation; /* Melhora o toque no celular */
        }

        #player { 
            position: absolute; 
            bottom: 5px; 
            left: 30px; 
            font-size: 40px; 
            z-index: 2; 
            transform: scaleX(-1);
        }

        #obstacle { position: absolute; bottom: 5px; right: -50px; font-size: 30px; }
        
        #road {
            position: absolute;
            bottom: 0; width: 200%; height: 2px;
            background: repeating-linear-gradient(90deg, #444 0, #444 20px, transparent 20px, transparent 40px);
        }

        .road-move { animation: road-move 0.6s linear infinite; }
        @keyframes road-move { from { left: 0; } to { left: -40px; } }

        #game-msg {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--neon-green); z-index: 5; text-align: center;
            padding: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="20260207_132012[1].jpg" class="profile-img">
    <h1>CHARLYS</h1>
    <p style="color: var(--secondary); margin-top: -10px;">@inimigo_do_amigo.ofc</p>
    
    <p class="bio">
        Piloto de <b>CG Titan 98</b> 🏍️. No PC, domino as estradas no <b>ETS2</b> e toco o terror no <b>GTA V</b>. 
        Sou animado, engraçado e parceiro. Café na garrafa é lei! ☕
    </p>
    
    <div style="text-align: left;">
        <span style="font-size: 11px;">HUMOR & AMIZADE</span>
        <div class="skill-bar"><div class="skill-progress" style="width: 100%;"></div></div>
        <span style="font-size: 11px;">PILOTAGEM NA TITAN</span>
        <div class="skill-bar"><div class="skill-progress" style="width: 85%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green);"></div></div>
    </div>

    <div class="links-grid">
        <a href="https://instagram.com/inimigo_do_amigo.ofc" class="btn btn-insta" target="_blank"><i class="fab fa-instagram"></i> Insta</a>
        <a href="https://wa.me/5569992919920" class="btn btn-whats" target="_blank"><i class="fab fa-whatsapp"></i> Whats</a>
        <a href="https://youtu.be/7SGmdnFT3oU" class="btn btn-yt" target="_blank"><i class="fas fa-truck"></i> Ver Gameplay ETS2</a>
    </div>
</div>

<div id="game-area" onmousedown="event.preventDefault(); handleInput();" ontouchstart="event.preventDefault(); handleInput();">
    <div id="game-msg">TOQUE PARA ACELERAR <br> (ESPAÇO PULA)</div>
    <div id="road"></div>
    <div id="player">🏍️</div>
    <div id="obstacle">🚧</div>
    <div id="score" style="position: absolute; top: 10px; right: 15px; font-weight: bold;">KM: 0</div>
</div>

<script>
    let isPlaying = false;
    let score = 0;
    let isJumping = false;
    
    // Detecta se é celular para ajustar velocidade
    const isMobile = window.innerWidth < 600;
    const gameSpeed = isMobile ? 7 : 11; // No celular o obstáculo move mais devagar

    const player = document.getElementById("player");
    const obstacle = document.getElementById("obstacle");
    const road = document.getElementById("road");
    const msg = document.getElementById("game-msg");
    const scoreText = document.getElementById("score");

    function handleInput() {
        if (!isPlaying) startGame();
        else jump();
    }

    function startGame() {
        isPlaying = true;
        score = 0;
        msg.style.display = "none";
        road.classList.add("road-move");
        obstacle.style.right = "-50px";
        scoreText.innerHTML = "KM: 0";
        gameLoop();
    }

    function jump() {
        if (isJumping) return;
        isJumping = true;
        
        let p = 5;
        // Subida instantânea
        let up = setInterval(() => {
            if (p >= 100) {
                clearInterval(up);
                // Queda pesada (Dino physics)
                let down = setInterval(() => {
                    if (p <= 5) {
                        clearInterval(down);
                        isJumping = false;
                        player.style.bottom = "5px";
                    }
                    p -= 10;
                    player.style.bottom = (p < 5 ? 5 : p) + "px";
                }, 12);
            }
            p += 12;
            player.style.bottom = p + "px";
        }, 12);
    }

    function gameLoop() {
        if (!isPlaying) return;

        let obsRight = parseInt(window.getComputedStyle(obstacle).right);
        let plyBottom = parseInt(player.style.bottom) || 5;

        if (obsRight > 420) {
            obstacle.style.right = "-50px";
            score += 10;
            scoreText.innerHTML = "KM: " + score;
        } else {
            obstacle.style.right = (obsRight + gameSpeed) + "px"; 
        }

        // Colisão calibrada para emojis
        if (obsRight > 300 && obsRight < 360 && plyBottom < 50) {
            gameOver();
            return;
        }
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        isPlaying = false;
        road.classList.remove("road-move");
        msg.innerHTML = "BATEU A TITAN! <br> TOQUE PARA RECOMEÇAR";
        msg.style.display = "flex";
        player.style.bottom = "5px";
        isJumping = false;
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
            e.preventDefault();
            handleInput();
        }
    });
</script>

</body>
</html>
